<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nix Tutorial - Lesson</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
</head>
<body class="page-lesson">
  <header class="lesson-header">
    <div class="lesson-header-inner">
      <a href="index.html" class="back-link" title="トップに戻る">←</a>
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="目次を開く">☰</button>
      <h1 class="lesson-title" id="lesson-title">読み込み中…</h1>
      <div class="lesson-progress">
        <div class="progress-bar small">
          <div class="progress-fill" id="ch-progress-fill" style="width:0%"></div>
        </div>
        <span class="progress-text" id="ch-progress-text">0/0</span>
      </div>
    </div>
  </header>

  <div class="lesson-body">
    <aside class="sidebar" id="sidebar">
      <h2 class="sidebar-title">章一覧</h2>
      <ol class="sidebar-list" id="sidebar-list"></ol>
    </aside>

    <main class="slide-area">
      <article class="slide-card" id="slide-card">
        <div class="slide-loading">読み込み中…</div>
      </article>

      <nav class="slide-nav">
        <button id="prev-btn" class="btn btn-secondary">← 前へ</button>
        <span class="slide-indicator" id="slide-indicator">- / -</span>
        <button id="next-btn" class="btn btn-primary">次へ →</button>
      </nav>
    </main>
  </div>

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/nix.min.js"></script>
  <script src="assets/js/progress.js"></script>
  <script src="assets/js/lesson.js"></script>
</body>
</html>
